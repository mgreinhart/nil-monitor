name = "nil-monitor-api"
main = "workers/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "nil-monitor-db"
database_id = "c205339b-2bde-4f06-ab64-bedef8db1f53"

[triggers]
# Group A (minute :00, :30) — high-volume news fetchers
# Group B (minute :07, :37) — lighter/supplemental fetchers
# AI pipeline at 10,11,20,21 UTC — worker checks actual ET hour to auto-adjust for DST
crons = ["0,30 * * * *", "7,37 * * * *", "0 10,11,20,21 * * *"]
