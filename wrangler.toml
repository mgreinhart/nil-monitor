name = "nil-monitor-api"
main = "workers/index.js"
compatibility_date = "2024-01-01"

[[d1_databases]]
binding = "DB"
database_name = "nil-monitor-db"
database_id = "c205339b-2bde-4f06-ab64-bedef8db1f53"

[triggers]
# Group A1 (minute :00, :30) — Google News (105q), NCAA RSS, NewsData
# Group A2 (minute :10, :40) — Bing News (62q), Publications (24 feeds)
# Group B  (minute :07, :37) — lighter/supplemental fetchers
# AI pipeline at 10,11,19,20 UTC — worker checks actual ET hour to auto-adjust for DST
# Morning brief: 6 AM ET (weekdays only). Afternoon brief: 3 PM ET (weekdays + Sunday).
# Saturday: no briefs. Sunday: afternoon only.
crons = ["0,30 * * * *", "10,40 * * * *", "7,37 * * * *", "25 10,11,19,20 * * *"]
